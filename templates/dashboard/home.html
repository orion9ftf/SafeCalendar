<!DOCTYPE html>
<html lang=
<head>
    <meta charset="utf-8">
    <title>Calendario Blindado</title>
</head>
<body>
    <h1>Calendario Blindado</h1>

    <h2>Seleccione un evento</h2>

    <select id="eventSelector">
        <option value="">Seleccione...</option>

        {% for event in events %}
            <option value="{{ event.id }}">
                {{ event.name }}
            </option>
        {% endfor %}
    </select>

<script>
    document
        .getElementById("eventSelector")
        .addEventListener("change", function () {

            const eventId = this.value;

            if (eventId) {
                window.location.href =
                    "/evento/" + eventId + "/";
            }
        });
</script>


</body>
</html>
